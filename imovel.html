<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel | Join Houses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <div class="container nav-content">
        <div class="logo">Join Houses</div>
    </div>
</header>

<section class="imovel-detalhe">
    <div class="container detalhe-grid">

        <div>
            <img id="imagem" class="imagem-detalhe" alt="Imóvel">

            <div class="descricao-box">
                <h2>Descrição</h2>
                <p id="descricao"></p>
            </div>
        </div>

        <div class="info-box">
            <span id="tipoBadge" class="badge"></span>

            <h1 id="titulo"></h1>
            <h2 id="preco"></h2>

            <p><strong>Bairro:</strong> <span id="bairro"></span></p>
            <p><strong>Cidade:</strong> <span id="cidade"></span></p>
            <p><strong>Quartos:</strong> <span id="quartos"></span></p>
            <p><strong>Banheiros:</strong> <span id="banheiros"></span></p>
            <p><strong>Vagas:</strong> <span id="vagas"></span></p>
            <p><strong>Área:</strong> <span id="area"></span> m²</p>

            <a href="https://wa.me/5584987755048" class="botao">
                Falar no WhatsApp
            </a>
        </div>

    </div>
</section>

<script src="js/data.js"></script>
<script src="js/imovel.js"></script>

</body>
</html>
