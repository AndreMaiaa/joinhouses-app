<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Join Houses</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

.logo {
  color: #FF4D00;
  font-weight: 600;
  font-size: 20px;
}

.btn {
  background: linear-gradient(45deg, #FF4D00, #ff7a00);
  padding: 10px 18px;
  border-radius: 8px;
  color: #fff;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 15px;
}

.hero p {
  color: #aaa;
  margin-bottom: 25px;
}

/* SECTION */
.section {
  padding: 80px 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.tag {
  background: #FF4D00;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 10px;
}

.price {
  font-size: 20px;
  margin: 10px 0;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: #FF4D00;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  color: white;
  font-size: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Join Houses</div>
  <a class="btn" href="https://wa.me/5584898775048">WhatsApp</a>
</header>

<section class="hero">
  <div>
    <h1>Encontre o imóvel ideal</h1>
    <p>Compra, aluguel ou temporada com a Join Houses</p>
    <a class="btn" href="https://wa.me/5584898775048">Falar no WhatsApp</a>
  </div>
</section>

<section class="section">
  <h2>Imóveis em destaque</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <div class="tag">Temporada</div>
        <h3>Flat em Ponta Negra</h3>
        <div class="price">R$ 250 / diária</div>
        <a class="btn" href="https://wa.me/5584898775048">Falar</a>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <div class="tag">Aluguel</div>
        <h3>Apartamento 2 quartos</h3>
        <div class="price">R$ 1.200 / mês</div>
        <a class="btn" href="https://wa.me/5584898775048">Falar</a>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <div class="tag">Venda</div>
        <h3>Beira Mar Premium</h3>
        <div class="price">R$ 320.000</div>
        <a class="btn" href="https://wa.me/5584898775048">Falar</a>
      </div>
    </div>

  </div>
</section>

<a class="whatsapp" href="https://wa.me/5584898775048">💬</a>

</body>
</html>
